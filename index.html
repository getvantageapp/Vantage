<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vantage</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #334155;
}

.container{
display:grid;
grid-template-columns:250px 1fr;
height:100vh;
}

.sidebar{
background:#020617;
padding:20px;
border-right:1px solid #334155;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.menu-item{
padding:10px;
margin-bottom:10px;
border-radius:8px;
background:#1e293b;
cursor:pointer;
}

.menu-item:hover{
background:#334155;
}

.main{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.card h3{
margin-top:0;
}

.section{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th, td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

</style>

</head>

<body>

<header>
VANTAGE — Financial Dashboard
</header>

<div class="container">

<div class="sidebar">

<h2>Menu</h2>

<div class="menu-item">💰 Gastos</div>
<div class="menu-item">📈 Inversiones</div>
<div class="menu-item">🧾 Presupuesto</div>
<div class="menu-item">🎯 Metas</div>
<div class="menu-item">🧠 Stress Diary</div>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Total Gastos</h3>
<p id="totalGastos">$0</p>
</div>

<div class="card">
<h3>Portafolio</h3>
<p>$0</p>
</div>

<div class="card">
<h3>Metas</h3>
<p>0 activas</p>
</div>

</div>

<div class="section">

<h3>Agregar Gasto</h3>

<input id="categoria" placeholder="Categoría">
<input id="cantidad" placeholder="Cantidad">

<button onclick="agregarGasto()">Agregar</button>

<table>

<thead>
<tr>
<th>Categoría</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody id="tablaGastos">

</tbody>

</table>

</div>

<div class="section">

<h3>Stress Diary</h3>

<input id="estado" placeholder="Cómo te sientes hoy">

<button onclick="guardarEstado()">Guardar</button>

<p id="estadoGuardado"></p>

</div>

</div>

</div>

<script>

let total = 0;

function agregarGasto(){

let categoria = document.getElementById("categoria").value;
let cantidad = parseFloat(document.getElementById("cantidad").value);

if(!categoria || !cantidad) return;

let tabla = document.getElementById("tablaGastos");

let fila = `<tr>
<td>${categoria}</td>
<td>$${cantidad}</td>
</tr>`;

tabla.innerHTML += fila;

total += cantidad;

document.getElementById("totalGastos").innerText = "$" + total;

}

function guardarEstado(){

let estado = document.getElementById("estado").value;

document.getElementById("estadoGuardado").innerText =
"Estado guardado: " + estado;

}

</script>

</body>
</html>
