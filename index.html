<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vantage Finance Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

/* TOP BAR */

.topbar{
height:70px;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
backdrop-filter:blur(10px);
border-bottom:1px solid #334155;
}

.logo{
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}

.user{
background:#1e293b;
padding:10px 15px;
border-radius:8px;
}

/* LAYOUT */

.layout{
display:flex;
height:calc(100vh - 70px);
}

/* SIDEBAR */

.sidebar{
width:250px;
background:rgba(2,6,23,0.7);
border-right:1px solid #334155;
padding:20px;
}

.menu{
margin-top:20px;
}

.menu-item{
padding:12px;
margin-bottom:10px;
border-radius:8px;
background:#1e293b;
cursor:pointer;
transition:0.3s;
}

.menu-item:hover{
background:#334155;
transform:translateX(5px);
}

/* MAIN */

.main{
flex:1;
padding:30px;
overflow:auto;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(30,41,59,0.8);
padding:20px;
border-radius:12px;
border:1px solid #334155;
}

.card h3{
font-size:16px;
margin-bottom:10px;
color:#94a3b8;
}

.card p{
font-size:28px;
font-weight:bold;
}

/* SECTION */

.section{
background:rgba(30,41,59,0.8);
padding:25px;
border-radius:12px;
border:1px solid #334155;
margin-bottom:30px;
}

/* INPUTS */

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* TABLE */

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

</style>
</head>

<body>

<div class="topbar">

<div class="logo">VANTAGE</div>

<div class="user">Dashboard</div>

</div>

<div class="layout">

<div class="sidebar">

<h2>Menu</h2>

<div class="menu">

<div class="menu-item">💰 Gastos</div>
<div class="menu-item">📈 Inversiones</div>
<div class="menu-item">🧾 Presupuesto</div>
<div class="menu-item">🎯 Metas</div>
<div class="menu-item">🧠 Stress Diary</div>

</div>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Total Gastos</h3>
<p id="totalGastos">$0</p>
</div>

<div class="card">
<h3>Portafolio</h3>
<p>$0</p>
</div>

<div class="card">
<h3>Metas activas</h3>
<p>0</p>
</div>

<div class="card">
<h3>Balance</h3>
<p>$0</p>
</div>

</div>

<div class="section">

<h2>Agregar Gasto</h2>

<input id="categoria" placeholder="Categoría">
<input id="cantidad" placeholder="Cantidad">

<button onclick="agregarGasto()">Agregar</button>

<table>

<thead>

<tr>
<th>Categoría</th>
<th>Cantidad</th>
</tr>

</thead>

<tbody id="tablaGastos">

</tbody>

</table>

</div>

<div class="section">

<h2>Stress Diary</h2>

<input id="estado" placeholder="Cómo te sientes hoy">

<button onclick="guardarEstado()">Guardar</button>

<p id="estadoGuardado"></p>

</div>

</div>

</div>

<script>

let total = 0;

function agregarGasto(){

let categoria = document.getElementById("categoria").value;

let cantidad = parseFloat(
document.getElementById("cantidad").value
);

if(!categoria || !cantidad) return;

let tabla = document.getElementById("tablaGastos");

let fila = `<tr>
<td>${categoria}</td>
<td>$${cantidad}</td>
</tr>`;

tabla.innerHTML += fila;

total += cantidad;

document.getElementById("totalGastos").innerText =
"$" + total;

}

function guardarEstado(){

let estado = document.getElementById("estado").value;

document.getElementById("estadoGuardado").innerText =
"Estado guardado: " + estado;

}

</script>

</body>
</html>
