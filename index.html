<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(270deg,#0f172a,#020617,#1e293b);
background-size:600% 600%;
animation:bgMove 20s infinite;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#020617;
padding-top:40px;
}

.sidebar h1{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:220px;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

input,button,textarea{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

.goalbar{
width:100%;
background:#334155;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.goalprogress{
height:20px;
background:#22c55e;
width:0%;
}

</style>

</head>

<body>

<div class="sidebar">

<h1>VANTAGE</h1>

<a href="#">Dashboard</a>
<a href="#">Gastos</a>
<a href="#">Inversiones</a>
<a href="#">Metas</a>
<a href="#">Stress Diary</a>

</div>

<div class="main">

<div class="card">
<h2>Agregar gasto</h2>

<input id="nombre" placeholder="Concepto">
<input id="cantidad" placeholder="Cantidad">
<button onclick="agregarGasto()">Agregar</button>

<table>

<thead>
<tr>
<th>Concepto</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody id="tablaGastos">
</tbody>

</table>

</div>

<div class="card">

<h2>Meta financiera</h2>

<input id="metaTotal" placeholder="Meta total">
<input id="metaActual" placeholder="Cantidad actual">
<button onclick="actualizarMeta()">Actualizar</button>

<div class="goalbar">
<div class="goalprogress" id="barra"></div>
</div>

</div>

<div class="card">

<h2>Stress Diary</h2>

<textarea id="diario" rows="4" style="width:100%" placeholder="Escribe cómo te sientes..."></textarea>
<button onclick="guardarDiario()">Guardar</button>

<p id="mensaje"></p>

</div>

</div>

<script>

let tabla = document.getElementById("tablaGastos")

function agregarGasto(){

let nombre=document.getElementById("nombre").value
let cantidad=document.getElementById("cantidad").value

if(nombre==""||cantidad=="") return

let fila=document.createElement("tr")

fila.innerHTML="<td>"+nombre+"</td><td>$"+cantidad+"</td>"

tabla.appendChild(fila)

guardarDatos()

}

function guardarDatos(){
localStorage.setItem("gastos",tabla.innerHTML)
}

function cargarDatos(){
let datos=localStorage.getItem("gastos")
if(datos){
tabla.innerHTML=datos
}
}

function actualizarMeta(){

let total=document.getElementById("metaTotal").value
let actual=document.getElementById("metaActual").value

let porcentaje=(actual/total)*100

document.getElementById("barra").style.width=porcentaje+"%"

}

function guardarDiario(){

let texto=document.getElementById("diario").value

localStorage.setItem("stress",texto)

document.getElementById("mensaje").innerText="Guardado"

}

window.onload=cargarDatos

</script>

</body>
</html>
