<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vantage Finance</title>

<style>

/* -------- RESET -------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* -------- BODY -------- */

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

/* -------- TOPBAR -------- */

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
background:rgba(0,0,0,0.5);
border-bottom:1px solid #334155;
}

.logo{
font-size:24px;
font-weight:bold;
letter-spacing:1px;
}

/* -------- LAYOUT -------- */

.layout{
display:flex;
height:calc(100vh - 70px);
}

/* -------- SIDEBAR -------- */

.sidebar{
width:240px;
background:#020617;
padding:20px;
border-right:1px solid #334155;
}

.menu-item{
padding:12px;
margin-bottom:10px;
background:#1e293b;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.menu-item:hover{
background:#334155;
}

/* -------- MAIN -------- */

.main{
flex:1;
padding:30px;
overflow:auto;
}

/* -------- CARDS -------- */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
border:1px solid #334155;
}

.card h3{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}

.card p{
font-size:26px;
font-weight:bold;
}

/* -------- SECTIONS -------- */

.section{
display:none;
background:#1e293b;
padding:25px;
border-radius:10px;
border:1px solid #334155;
margin-bottom:30px;
}

.section.active{
display:block;
}

/* -------- INPUTS -------- */

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

button{
padding:10px 15px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* -------- TABLE -------- */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

/* -------- PROGRESS -------- */

.progress{
height:20px;
background:#0f172a;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
}

/* -------- CHART -------- */

canvas{
background:#020617;
border-radius:10px;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="topbar">

<div class="logo">VANTAGE</div>

<div>Finance Dashboard</div>

</div>

<div class="layout">

<div class="sidebar">

<div class="menu-item" onclick="show('dashboard')">Dashboard</div>
<div class="menu-item" onclick="show('gastos')">Gastos</div>
<div class="menu-item" onclick="show('presupuesto')">Presupuesto</div>
<div class="menu-item" onclick="show('metas')">Metas</div>
<div class="menu-item" onclick="show('stress')">Stress Diary</div>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
<h3>Total Gastos</h3>
<p id="total">$0</p>
</div>

<div class="card">
<h3>Presupuesto</h3>
<p id="presupuestoTotal">$0</p>
</div>

<div class="card">
<h3>Metas</h3>
<p id="metasCount">0</p>
</div>

<div class="card">
<h3>Balance</h3>
<p id="balance">$0</p>
</div>

</div>

<canvas id="chart" width="400" height="200"></canvas>

</div>

<!-- GASTOS -->

<div id="gastos" class="section">

<h2>Agregar gasto</h2>

<input id="categoria" placeholder="Categoría">
<input id="cantidad" placeholder="Cantidad">

<button onclick="agregarGasto()">Agregar</button>

<table>

<thead>
<tr>
<th>Categoría</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody id="tablaGastos"></tbody>

</table>

</div>

<!-- PRESUPUESTO -->

<div id="presupuesto" class="section">

<h2>Definir presupuesto</h2>

<input id="presupuestoInput" placeholder="Presupuesto mensual">

<button onclick="guardarPresupuesto()">Guardar</button>

<p id="presupuestoTexto"></p>

</div>

<!-- METAS -->

<div id="metas" class="section">

<h2>Crear meta</h2>

<input id="metaNombre" placeholder="Nombre">
<input id="metaCantidad" placeholder="Cantidad">

<button onclick="crearMeta()">Crear</button>

<div id="listaMetas"></div>

</div>

<!-- STRESS -->

<div id="stress" class="section">

<h2>Stress Diary</h2>

<input id="estado" placeholder="Cómo te sientes hoy">

<button onclick="guardarEstado()">Guardar</button>

<p id="mensaje"></p>

</div>

</div>

</div>

<script>

/* -------- NAVEGACION -------- */

function show(id){

let sections=document.querySelectorAll(".section");

sections.forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

/* -------- GASTOS -------- */

let gastos=[];
let total=0;

function agregarGasto(){

let cat=document.getElementById("categoria").value;

let cant=parseFloat(document.getElementById("cantidad").value);

if(!cat||!cant)return;

gastos.push({cat,cant});

total+=cant;

actualizar();

guardar();

}

function actualizar(){

let tabla=document.getElementById("tablaGastos");

tabla.innerHTML="";

gastos.forEach(g=>{

tabla.innerHTML+=
`<tr>
<td>${g.cat}</td>
<td>$${g.cant}</td>
</tr>`;

});

document.getElementById("total").innerText="$"+total;

dibujar();

}

/* -------- PRESUPUESTO -------- */

let presupuesto=0;

function guardarPresupuesto(){

presupuesto=parseFloat(
document.getElementById("presupuestoInput").value
);

document.getElementById("presupuestoTexto").innerText=
"Presupuesto: $"+presupuesto;

document.getElementById("presupuestoTotal").innerText=
"$"+presupuesto;

guardar();

}

/* -------- METAS -------- */

let metas=[];

function crearMeta(){

let nombre=document.getElementById("metaNombre").value;

let cant=parseFloat(
document.getElementById("metaCantidad").value
);

metas.push({nombre,cant});

renderMetas();

guardar();

}

function renderMetas(){

let div=document.getElementById("listaMetas");

div.innerHTML="";

metas.forEach(m=>{

div.innerHTML+=`
<p>${m.nombre} - $${m.cant}</p>
<div class="progress">
<div class="progress-bar" style="width:10%"></div>
</div>
`;

});

document.getElementById("metasCount").innerText=metas.length;

}

/* -------- STRESS -------- */

function guardarEstado(){

let estado=document.getElementById("estado").value;

document.getElementById("mensaje").innerText=
"Guardado: "+estado;

localStorage.setItem("estado",estado);

}

/* -------- GRAFICA -------- */

function dibujar(){

let canvas=document.getElementById("chart");

let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,400,200);

let x=10;

gastos.forEach(g=>{

let h=g.cant;

ctx.fillStyle="#3b82f6";

ctx.fillRect(x,200-h,30,h);

x+=40;

});

}

/* -------- STORAGE -------- */

function guardar(){

localStorage.setItem("gastos",JSON.stringify(gastos));

localStorage.setItem("total",total);

localStorage.setItem("presupuesto",presupuesto);

localStorage.setItem("metas",JSON.stringify(metas));

}

function cargar(){

let g=localStorage.getItem("gastos");

if(g)gastos=JSON.parse(g);

let t=localStorage.getItem("total");

if(t)total=parseFloat(t);

let p=localStorage.getItem("presupuesto");

if(p)presupuesto=parseFloat(p);

let m=localStorage.getItem("metas");

if(m)metas=JSON.parse(m);

actualizar();

renderMetas();

}

window.onload=cargar;

</script>

</body>
</html>
